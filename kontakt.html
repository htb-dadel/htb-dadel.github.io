<body>

  <div class="box">
    <h1>Kontakt</h1>

      <a href="index.html">Home</a>

  <div class="content">
    <h2>Kontaktformular</h2>

    <form action="https://formspree.io/f/DEIN-FORMSPREE-CODE" method="POST">
      <label>Vorname:</label><br>
      <input type="text" name="vorname" required><br>

      <label>Nachname:</label><br>
      <input type="text" name="nachname" required><br>

      <label>Ort / Adresse:</label><br>
      <input type="text" name="adresse"><br>

      <label>E-Mail:</label><br>
      <input type="email" name="email" required><br>

      <label>Telefon:</label><br>
      <input type="tel" name="telefon"><br>

      <label>Nachricht:</label><br>
      <textarea name="nachricht" required></textarea><br>

      <button type="submit">Nachricht senden</button>
    </form>

  </div>

</body>
</html>
